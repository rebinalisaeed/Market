<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بەکارهێنەران - سیستەمی مارکێت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', 'Arial', sans-serif; }
        body { background: #f0f2f5; }
        .top-bar { background: #1e3c72; color: white; height: 30px; line-height: 30px; padding: 0 20px; display: flex; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; }
        .container { margin-top: 50px; padding: 20px; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .back-button { display: inline-block; margin-bottom: 20px; color: #1e3c72; text-decoration: none; padding: 8px 15px; background: white; border-radius: 5px; }
        h1 { color: #1e3c72; margin-bottom: 20px; }
        .add-form { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; }
        button { background: #1e3c72; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        th { background: #1e3c72; color: white; padding: 15px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #ddd; }
        .delete-btn { color: #c62828; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-bar" id="topBar"></div>
    
    <div class="container">
        <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-right"></i> گەڕانەوە</a>
        <h1><i class="fas fa-users-cog"></i> بەڕێوەبردنی بەکارهێنەران</h1>
        
        <div class="add-form">
            <h3>زیادکردنی بەکارهێنەری نوێ</h3>
            <div class="form-group">
                <input type="text" id="newUsername" placeholder="ناوی بەکارهێنەر">
            </div>
            <div class="form-group">
                <input type="password" id="newPassword" placeholder="تێپەڕەوشە">
            </div>
            <div class="form-group">
                <input type="text" id="newFullName" placeholder="ناوی تەواو">
            </div>
            <div class="form-group">
                <select id="newRole">
                    <option value="super_admin">سوپەر ئەدمین</option>
                    <option value="admin">ئەدمین</option>
                    <option value="store">کۆگا</option>
                    <option value="cashier">فرۆشیار</option>
                </select>
            </div>
            <button onclick="addUser()"><i class="fas fa-plus"></i> زیادکردن</button>
        </div>
        
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ناوی بەکارهێنەر</th>
                        <th>ناوی تەواو</th>
                        <th>ڕۆڵ</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let users = [
            { id: 1, username: 'super', password: 'admin123', fullName: 'Super Admin', role: 'super_admin' },
            { id: 2, username: 'admin', password: 'admin123', fullName: 'Admin User', role: 'admin' },
            { id: 3, username: 'store', password: 'store123', fullName: 'Store Keeper', role: 'store' },
            { id: 4, username: 'cashier', password: 'cash123', fullName: 'Cashier User', role: 'cashier' }
        ];

        function updateTopBar() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            document.getElementById('topBar').innerHTML = `
                <div><i class="fas fa-user"></i> ${user.name}</div>
                <div><i class="fas fa-calendar"></i> ${new Date().toLocaleDateString('ckb')}</div>
            `;
        }

        function loadUsers() {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '';
            
            users.forEach(user => {
                if (user.id !== 1) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.fullName}</td>
                        <td>${user.role}</td>
                        <td><i class="fas fa-trash delete-btn" onclick="deleteUser(${user.id})"></i></td>
                    `;
                    tbody.appendChild(row);
                }
            });
        }

        function addUser() {
            const newUser = {
                id: users.length + 1,
                username: document.getElementById('newUsername').value,
                password: document.getElementById('newPassword').value,
                fullName: document.getElementById('newFullName').value,
                role: document.getElementById('newRole').value
            };
            
            if (newUser.username && newUser.password && newUser.fullName) {
                users.push(newUser);
                loadUsers();
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('newFullName').value = '';
            }
        }

        function deleteUser(id) {
            if (confirm('دڵنیایت لە سڕینەوەی ئەم بەکارهێنەرە؟')) {
                users = users.filter(u => u.id !== id);
                loadUsers();
            }
        }

        updateTopBar();
        loadUsers();
    </script>
</body>
</html>
