<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چوونەژوورەوە - سیستەمی مارکێت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tahoma', 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .demo-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
        }
        
        .demo-info p {
            margin: 5px 0;
            color: #666;
        }
        
        .demo-info strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2><i class="fas fa-store"></i> چوونەژوورەوە</h2>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> ناوی بەکارهێنەر</label>
                <input type="text" id="username" placeholder="super / admin / store / cashier" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> تێپەڕەوشە</label>
                <input type="password" id="password" placeholder="admin123 / store123 / cash123" required>
            </div>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> چوونەژوورەوە</button>
        </form>
        
        <div class="demo-info">
            <p><strong>زانیاری چوونەژوورەوە:</strong></p>
            <p>سوپەر ئەدمین: super / admin123</p>
            <p>ئەدمین: admin / admin123</p>
            <p>کۆگا: store / store123</p>
            <p>فرۆشیار: cashier / cash123</p>
        </div>
    </div>

    <script>
        const users = [
            { username: 'super', password: 'admin123', name: 'سوپەر ئەدمین', role: 'super_admin' },
            { username: 'admin', password: 'admin123', name: 'ئەدمین', role: 'admin' },
            { username: 'store', password: 'store123', name: 'کۆگادار', role: 'store' },
            { username: 'cashier', password: 'cash123', name: 'فرۆشیار', role: 'cashier' }
        ];

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify({
                    username: user.username,
                    name: user.name,
                    role: user.role
                }));
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'ناوی بەکارهێنەر یان تێپەڕەوشە هەڵەیە';
                
                setTimeout(() => {
                    document.getElementById('error').style.display = 'none';
                }, 3000);
            }
        });
        
        // پشکنینی ئەگەر بەکارهێنەر پێشتر چووبێتە ژوورەوە
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
