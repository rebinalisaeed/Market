<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کاڵای نوێ - سیستەمی مارکێت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', 'Arial', sans-serif; }
        body { background: #f0f2f5; }
        .top-bar { background: #1e3c72; color: white; height: 30px; line-height: 30px; padding: 0 20px; display: flex; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; }
        .container { margin-top: 50px; padding: 20px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .back-button { display: inline-block; margin-bottom: 20px; color: #1e3c72; text-decoration: none; padding: 8px 15px; background: white; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: all 0.3s; }
        .back-button:hover { background: #1e3c72; color: white; }
        h1 { color: #1e3c72; margin-bottom: 20px; text-align: center; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: bold; }
        label i { margin-left: 5px; color: #1e3c72; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: all 0.3s; }
        input:focus, select:focus { outline: none; border-color: #1e3c72; }
        .btn-submit { width: 100%; padding: 15px; background: #1e3c72; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 25px; transition: all 0.3s; }
        .btn-submit:hover { background: #2a4a7a; transform: translateY(-2px); }
        .message { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .success { background: #d4edda; color: #155724; border-right: 4px solid #4CAF50; }
        .error { background: #f8d7da; color: #721c24; border-right: 4px solid #f44336; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .form-group.full-width { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="top-bar" id="topBar"></div>
    
    <div class="container">
        <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-right"></i> گەڕانەوە</a>
        <h1><i class="fas fa-box"></i> ناساندنی کاڵای نوێ</h1>
        
        <div class="message" id="message"></div>
        
        <div class="form-container">
            <form id="productForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fas fa-barcode"></i> باڕکۆد</label>
                        <input type="text" id="barcode" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> ناوی کاڵا</label>
                        <input type="text" id="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-folder"></i> کاتێگۆری</label>
                        <select id="category" required>
                            <option value="">-- هەڵبژاردن --</option>
                            <option value="1">شیرینی</option>
                            <option value="2">خواردنەوە</option>
                            <option value="3">شووشەیی</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-cubes"></i> بڕی کاڵا</label>
                        <input type="number" id="quantity" value="0" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-shopping-basket"></i> نرخی کڕین</label>
                        <input type="number" id="purchasePrice" step="0.001" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-cash-register"></i> نرخی فرۆشتن</label>
                        <input type="number" id="sellingPrice" step="0.001" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-exclamation-triangle"></i> کەمترین بڕ</label>
                        <input type="number" id="minQuantity" value="5" min="1">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-calendar-times"></i> بەرواری بەسەرچوون</label>
                        <input type="date" id="expiryDate">
                    </div>
                    
                    <div class="form-group full-width">
                        <label><i class="fas fa-sticky-note"></i> تێبینی</label>
                        <textarea id="notes" rows="3"></textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">
                    <i class="fas fa-save"></i> تۆمارکردنی کاڵا
                </button>
            </form>
        </div>
    </div>

    <script>
        function updateTopBar() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) window.location.href = 'login.html';
            
            const now = new Date();
            document.getElementById('topBar').innerHTML = `
                <div><i class="fas fa-user"></i> ${user.name}</div>
                <div><i class="fas fa-calendar"></i> ${now.toLocaleDateString('ckb')}</div>
            `;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function generateBarcode() {
            return '626' + Date.now().toString().slice(-8) + Math.floor(Math.random() * 1000);
        }

        document.getElementById('barcode').value = generateBarcode();

        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const product = {
                id: Date.now(),
                barcode: document.getElementById('barcode').value,
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                quantity: parseInt(document.getElementById('quantity').value),
                purchasePrice: parseFloat(document.getElementById('purchasePrice').value),
                sellingPrice: parseFloat(document.getElementById('sellingPrice').value),
                minQuantity: parseInt(document.getElementById('minQuantity').value),
                expiryDate: document.getElementById('expiryDate').value,
                notes: document.getElementById('notes').value
            };

            let products = JSON.parse(localStorage.getItem('products')) || [];
            
            if (products.some(p => p.barcode === product.barcode)) {
                showMessage('ئەم باڕکۆدە پێشتر تۆمار کراوە!', 'error');
                return;
            }

            products.push(product);
            localStorage.setItem('products', JSON.stringify(products));
            
            showMessage('کاڵا بە سەرکەوتوویی تۆمار کرا', 'success');
            
            document.getElementById('productForm').reset();
            document.getElementById('barcode').value = generateBarcode();
        });

        updateTopBar();
    </script>
</body>
</html>
