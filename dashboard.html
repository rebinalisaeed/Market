<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبۆرد - سیستەمی مارکێت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', 'Arial', sans-serif; }
        body { background: white; }
        .top-bar { background: #1e3c72; color: white; height: 30px; line-height: 30px; padding: 0 20px; display: flex; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .dashboard { margin-top: 30px; padding: 20px; }
        .dashboard-title { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .box { border-radius: 10px; padding: 20px; color: white; cursor: pointer; transition: transform 0.3s; display: flex; align-items: center; height: 100px; }
        .box:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .box-icon { font-size: 40px; width: 40%; text-align: center; }
        .box-title { width: 60%; font-size: 14px; text-align: center; font-weight: bold; }
        .box-blue-1 { background: #2196F3; } .box-blue-2 { background: #1976D2; } .box-blue-3 { background: #0D47A1; }
        .box-blue-4 { background: #42A5F5; } .box-blue-5 { background: #1E88E5; } .box-blue-6 { background: #1565C0; }
        .box-blue-7 { background: #0D3B66; } .box-green { background: #4CAF50; } .box-orange { background: #FF9800; }
        .box-red { background: #f44336; } .box-brown { background: #8B4513; }
        @media (max-width: 1200px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }
        .logout-btn { color: white; cursor: pointer; margin-right: 15px; }
        .logout-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="top-bar" id="topBar"></div>
    
    <div class="dashboard">
        <h2 class="dashboard-title">داشبۆردی سەرەکی</h2>
        <div class="grid-container" id="dashboardBoxes"></div>
    </div>

    <script>
        function updateTopBar() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) window.location.href = 'login.html';
            
            const now = new Date();
            const days = ['یەکشەممە', 'دووشەممە', 'سێشەممە', 'چوارشەممە', 'پێنجشەممە', 'هەینی', 'شەممە'];
            
            document.getElementById('topBar').innerHTML = `
                <div><i class="fas fa-user"></i> ${user.name} (${user.role})</div>
                <div>
                    <i class="fas fa-calendar-alt"></i> ${now.toLocaleDateString('ckb')}
                    <i class="fas fa-clock"></i> ${now.toLocaleTimeString('ckb')}
                    <i class="fas fa-calendar-day"></i> ${days[now.getDay()]}
                    <span class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> دەرچوون</span>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        const boxes = [
            // شین (١-٧)
            { name: 'کاڵا فرۆشتن', icon: 'fa-shopping-cart', color: 'box-blue-1', link: 'sell.html', roles: ['super_admin', 'admin', 'cashier'] },
            { name: 'وەسڵی فرۆشراوەکان', icon: 'fa-file-invoice', color: 'box-blue-2', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'پارە وەرگرتن لە کاشێر', icon: 'fa-money-bill-wave', color: 'box-blue-3', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'پارە خەرجکردن', icon: 'fa-money-bill-alt', color: 'box-blue-4', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'تۆمارکردنی بەهەدەردراوەکان', icon: 'fa-trash-alt', color: 'box-blue-5', link: '#', roles: ['super_admin', 'admin', 'store'] },
            { name: 'دروستکردنی نرخ و ناو', icon: 'fa-tags', color: 'box-blue-6', link: '#', roles: ['super_admin', 'admin', 'store'] },
            { name: 'دروستکردنی باڕکۆد', icon: 'fa-barcode', color: 'box-blue-7', link: '#', roles: ['super_admin', 'admin', 'store'] },
            
            // سەوز (٨-١٢)
            { name: 'ناساندنی کاڵای نوێ', icon: 'fa-box', color: 'box-green', link: 'new-product.html', roles: ['super_admin', 'admin', 'store'] },
            { name: 'لیستی کاڵاکان', icon: 'fa-list', color: 'box-green', link: 'products-list.html', roles: ['super_admin', 'admin', 'store'] },
            { name: 'تۆمارکردنی وەسڵ', icon: 'fa-file-invoice', color: 'box-green', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'وەسڵە کردراوەکان', icon: 'fa-file-invoice', color: 'box-green', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'قەرزی کۆمپانیاکان', icon: 'fa-building', color: 'box-green', link: '#', roles: ['super_admin', 'admin'] },
            
            // پرتەقاڵی (١٣-١٧)
            { name: 'لیستی قەرزارەکان', icon: 'fa-users', color: 'box-orange', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'وەرگرتنەوەی قەرز', icon: 'fa-hand-holding-usd', color: 'box-orange', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'ئاگادارکردنەوەی قیست', icon: 'fa-bell', color: 'box-orange', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'داشبۆردی قیست', icon: 'fa-chart-line', color: 'box-orange', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'قاسە', icon: 'fa-coins', color: 'box-orange', link: '#', roles: ['super_admin', 'admin'] },
            
            // سور (١٨-٢٧)
            { name: 'قازانجەکان', icon: 'fa-chart-pie', color: 'box-red', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'بەسەرچووەکان', icon: 'fa-calendar-times', color: 'box-red', link: '#', roles: ['super_admin', 'admin', 'store'] },
            { name: 'کاڵا کەمبووەکان', icon: 'fa-exclamation-triangle', color: 'box-red', link: '#', roles: ['super_admin', 'admin', 'store'] },
            { name: 'جەردی فرۆشراوەکان', icon: 'fa-chart-bar', color: 'box-red', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'کەشف حساب پارە', icon: 'fa-calculator', color: 'box-red', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'کەشف حسابی کڕیار', icon: 'fa-user-check', color: 'box-red', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'کەشف حسابی کڕین', icon: 'fa-shopping-bag', color: 'box-red', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'ڕاپۆرتی پارە', icon: 'fa-file-alt', color: 'box-red', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'جەردکردن', icon: 'fa-warehouse', color: 'box-red', link: '#', roles: ['super_admin', 'admin', 'store'] },
            { name: 'بەکارهێنەری سیستەم', icon: 'fa-users-cog', color: 'box-red', link: 'users.html', roles: ['super_admin'] },
            
            // قاوەیی (٢٨-٣٢)
            { name: 'پاشەکەوتی داتاکان', icon: 'fa-database', color: 'box-brown', link: '#', roles: ['super_admin'] },
            { name: 'دەفتەری ڕۆژانە', icon: 'fa-book', color: 'box-brown', link: '#', roles: ['super_admin', 'admin'] },
            { name: 'پێداویستی', icon: 'fa-clipboard-list', color: 'box-brown', link: '#', roles: ['super_admin', 'admin', 'store'] },
            { name: 'ڕێکخستن', icon: 'fa-cog', color: 'box-brown', link: 'settings.html', roles: ['super_admin', 'admin'] }
        ];

        function loadDashboard() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) window.location.href = 'login.html';
            
            const container = document.getElementById('dashboardBoxes');
            container.innerHTML = '';
            
            boxes.forEach(box => {
                if (box.roles.includes(user.role)) {
                    const div = document.createElement('div');
                    div.className = `box ${box.color}`;
                    div.onclick = () => window.location.href = box.link;
                    div.innerHTML = `
                        <div class="box-icon"><i class="fas ${box.icon}"></i></div>
                        <div class="box-title">${box.name}</div>
                    `;
                    container.appendChild(div);
                }
            });
        }

        updateTopBar();
        loadDashboard();
        setInterval(updateTopBar, 1000);
    </script>
</body>
</html>
