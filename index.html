<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی مارکێت - پێشوازی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', 'Arial', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .welcome-container { text-align: center; color: white; padding: 20px; }
        h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        p { font-size: 20px; margin-bottom: 40px; opacity: 0.9; }
        .buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 15px 40px; border-radius: 50px; text-decoration: none; color: white; font-size: 18px; font-weight: bold; transition: transform 0.3s; border: 2px solid transparent; }
        .btn-login { background: white; color: #667eea; }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-demo { background: transparent; border: 2px solid white; }
        .btn-demo:hover { background: white; color: #667eea; transform: translateY(-3px); }
        .features { margin-top: 60px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 900px; }
        .feature { text-align: center; padding: 20px; }
        .feature i { font-size: 40px; margin-bottom: 15px; color: #ffd700; }
        @media (max-width: 768px) { h1 { font-size: 36px; } .features { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>سیستەمی بەڕێوەبردنی مارکێت</h1>
        <p>سیستەمێکی تەواو بۆ بەڕێوەبردنی فرۆشتن، کۆگا، قەرز و ڕاپۆرتەکان</p>
        <div class="buttons">
            <a href="login.html" class="btn btn-login">چوونەژوورەوە</a>
            <a href="#features" class="btn btn-demo">زیاتر بزانە</a>
        </div>
        <div class="features" id="features">
            <div class="feature"><i class="fas fa-shopping-cart"></i><h3>فرۆشتن و کاشێر</h3></div>
            <div class="feature"><i class="fas fa-warehouse"></i><h3>بەڕێوەبردنی کۆگا</h3></div>
            <div class="feature"><i class="fas fa-chart-line"></i><h3>ڕاپۆرت و قازانج</h3></div>
        </div>
    </div>
</body>
</html>
