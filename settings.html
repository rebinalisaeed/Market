<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕێکخستنەکان - سیستەمی مارکێت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', 'Arial', sans-serif; }
        body { background: #f0f2f5; }
        .top-bar { background: #1e3c72; color: white; height: 30px; line-height: 30px; padding: 0 20px; display: flex; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; }
        .container { margin-top: 50px; padding: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .back-button { display: inline-block; margin-bottom: 20px; color: #1e3c72; text-decoration: none; padding: 8px 15px; background: white; border-radius: 5px; }
        h1 { color: #1e3c72; margin-bottom: 20px; }
        .settings-form { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; }
        button { background: #1e3c72; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; margin-top: 20px; }
        .success-message { background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="top-bar" id="topBar"></div>
    
    <div class="container">
        <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-right"></i> گەڕانەوە</a>
        <h1><i class="fas fa-cog"></i> ڕێکخستنەکانی سیستەم</h1>
        
        <div class="success-message" id="successMessage">ڕێکخستنەکان پاشەکەوت کرا</div>
        
        <div class="settings-form">
            <h3 style="margin-bottom: 20px;">زانیاری کۆمپانیا</h3>
            
            <div class="form-group">
                <label>ناوی کۆمپانیا/مارکێت</label>
                <input type="text" id="companyName" value="مارکێتەکەم">
            </div>
            
            <div class="form-group">
                <label>ژمارە تەلەفۆن</label>
                <input type="text" id="companyPhone" value="٠٧٧٠٠٠٠٠٠٠">
            </div>
            
            <div class="form-group">
                <label>ناونیشان</label>
                <input type="text" id="companyAddress" value="سلێمانی، بازاڕی گەورە">
            </div>
            
            <div class="form-group">
                <label>ڕێژەی باج (٪)</label>
                <input type="number" id="taxRate" value="0" step="0.1">
            </div>
            
            <hr style="margin: 30px 0;">
            
            <h3 style="margin-bottom: 20px;">ڕێکخستنەکانی تر</h3>
            
            <div class="form-group">
                <label>زمانی سیستەم</label>
                <select id="language">
                    <option value="ckb">کوردی</option>
                    <option value="ar">عەرەبی</option>
                    <option value="en">ئینگلیزی</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>جۆری دراو</label>
                <select id="currency">
                    <option value="iqd">دینار عێراقی</option>
                    <option value="usd">دۆلار</option>
                </select>
            </div>
            
            <button onclick="saveSettings()"><i class="fas fa-save"></i> پاشەکەوتکردن</button>
        </div>
    </div>

    <script>
        function updateTopBar() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            document.getElementById('topBar').innerHTML = `
                <div><i class="fas fa-user"></i> ${user.name}</div>
                <div><i class="fas fa-calendar"></i> ${new Date().toLocaleDateString('ckb')}</div>
            `;
        }

        function saveSettings() {
            const settings = {
                companyName: document.getElementById('companyName').value,
                companyPhone: document.getElementById('companyPhone').value,
                companyAddress: document.getElementById('companyAddress').value,
                taxRate: document.getElementById('taxRate').value,
                language: document.getElementById('language').value,
                currency: document.getElementById('currency').value
            };
            
            localStorage.setItem('settings', JSON.stringify(settings));
            
            const msg = document.getElementById('successMessage');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('settings'));
            if (settings) {
                document.getElementById('companyName').value = settings.companyName;
                document.getElementById('companyPhone').value = settings.companyPhone;
                document.getElementById('companyAddress').value = settings.companyAddress;
                document.getElementById('taxRate').value = settings.taxRate;
                document.getElementById('language').value = settings.language;
                document.getElementById('currency').value = settings.currency;
            }
        }

        updateTopBar();
        loadSettings();
    </script>
</body>
</html>
